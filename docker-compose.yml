version: '3.3'

services:
  career_frontend:
    container_name: career_frontend
    build: ./app
    ports:
      - "4000:4000"
    restart: always
    env_file:
      - ./app/.env
    depends_on:
      - career_backend

  career_postgres:
    container_name: career_postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: career
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    volumes:
      - "./postgres-data:/var/lib/postgresql/data"
    ports:
      - "5432:5432"

  career_backend:
    container_name: career_backend
    build: ./backend
    ports:
      - "8000:8000"
    command: sh -c "uvicorn backend.asgi:application --host 0.0.0.0 --port 8000 --reload"
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/:/app/
      - ./media/:/media/
      - ./static/:/static/
    depends_on:
      - career_postgres
      - career_redis

  career_redis:
    container_name: career_redis
    image: redis:alpine
    volumes:
      - "./redis-data:/data"

  career_celery:
    container_name: career_celery
    build: ./backend/
    command: celery -A backend worker -l info
    volumes:
      - ./backend/:/app/
      - ./media/:/media/
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - career_postgres
      - career_redis

  career_celery_beat:
    container_name: career_celery_beat
    build: ./backend/
    command: celery -A backend beat -l info
    volumes:
      - ./backend/:/app/
      - ./media/:/media/
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - career_postgres
      - career_redis